name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout to a repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install flake8
          pip install safety requests==2.25.0

      - name: Lint
        run: flake8 src/ tests/
          
      - name: Security Scan
        run: pip install bandit && bandit -r src/
          
      - name: run the tests
        run: pytest -q